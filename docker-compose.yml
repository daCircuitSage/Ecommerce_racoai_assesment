services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: bash -lc "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=db
      - DB_PORT=5432
      - ALLOWED_HOSTS=0.0.0.0,localhost
      - DEBUG=False
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/ecommerceBackend/staticfiles
      - media_volume:/app/ecommerceBackend/media
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ecommerce_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  static_volume:
  media_volume:
